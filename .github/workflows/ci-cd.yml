name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'release/*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

env:
  NODE_VERSION: '18'
  PNPM_VERSION: '8.15.0'
  GCP_REGION: 'us-central1'

jobs:
  # ===========================================
  # Lint & Type Check
  # ===========================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: |
            **/node_modules
            ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install

      - name: Run lint
        run: pnpm run lint
        continue-on-error: true

      - name: Type check
        run: pnpm exec tsc --noEmit --project apps/api/tsconfig.json
        continue-on-error: true

  # ===========================================
  # Unit Tests
  # ===========================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: |
            **/node_modules
            ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm run test:cov
        env:
          CI: true
          JWT_SECRET: test-secret-key-for-unit-tests-min-32-chars

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false

  # ===========================================
  # Health Check
  # ===========================================
  health-check:
    name: System Health Check
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install

      - name: Run health check
        run: |
          cd apps/api
          npx ts-node src/health-check.ts
        env:
          JWT_SECRET: test-secret-key-min-32-chars-for-health-check
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-key
          CORS_ORIGIN: http://localhost:3000
          NEXT_PUBLIC_B2B_URL: http://localhost:3001
          NEXT_PUBLIC_B2C_URL: http://localhost:3002
          NEXT_PUBLIC_LANDING_URL: http://localhost:3000
          NEXT_PUBLIC_COOKIE_DOMAIN: localhost
        continue-on-error: true

  # ===========================================
  # E2E Tests
  # ===========================================
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [health-check]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install

      - name: Run E2E tests
        run: pnpm run test:e2e
        env:
          CI: true
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          JWT_SECRET: test-secret-key-for-e2e-tests-min-32-chars
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-key

      - name: Upload E2E results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: e2e-results
          path: apps/api/test-results

  # ===========================================
  # Build API
  # ===========================================
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: [e2e]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: |
            **/node_modules
            ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install

      - name: Build API
        run: pnpm run build --filter=api

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: api-dist
          path: apps/api/dist
          retention-days: 7

  # ===========================================
  # Build Web Apps
  # ===========================================
  build-web:
    name: Build Web Apps
    runs-on: ubuntu-latest
    needs: [e2e]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: |
            **/node_modules
            ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install

      - name: Build landing page
        run: pnpm run build --filter=landing

      - name: Build B2B portal
        run: pnpm run build --filter=www

      - name: Build B2C portal
        run: pnpm run build --filter=agriculture

      - name: Build admin dashboard
        run: pnpm run build --filter=admin

      - name: Upload web artifacts
        uses: actions/upload-artifact@v3
        with:
          name: web-dist
          path: |
            apps/web/apps/landing/.next
            apps/web/apps/www/.next
            apps/web/apps/agriculture/.next
            apps/web/apps/admin/.next
          retention-days: 7

  # ===========================================
  # Security Scan
  # ===========================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run Snyk
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Run dependency check
        run: npx depcheck
        continue-on-error: true

  # ===========================================
  # Deploy to Staging
  # ===========================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    if: github.ref == 'refs/heads/develop' || github.event_name == 'workflow_dispatch'

    environment:
      name: staging
      url: https://staging.knbiosciences.in

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download API artifacts
        uses: actions/download-artifact@v3
        with:
          name: api-dist
          path: apps/api/dist

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_STAGING_SERVICE_ACCOUNT_KEY }}
          project_id: ${{ secrets.GCP_STAGING_PROJECT_ID }}

      - name: Deploy API to Staging
        run: |
          gcloud run deploy kn-api-staging \
            --image gcr.io/${{ secrets.GCP_STAGING_PROJECT_ID }}/kn-api:staging-${{ github.sha }} \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --allow-unauthenticated \
            --set-env-vars NODE_ENV=staging \
            --set-secrets SUPABASE_URL=supabase-url:latest,SUPABASE_SERVICE_ROLE_KEY=supabase-key:latest

      - name: Verify staging deployment
        run: |
          gcloud run services describe kn-api-staging \
            --platform managed \
            --region ${{ env.GCP_REGION }}

  # ===========================================
  # Production Deployment Gate
  # ===========================================
  deployment-gate:
    name: Production Deployment Gate
    runs-on: ubuntu-latest
    needs: [deploy-staging, security]
    if: github.ref == 'refs/heads/main'

    environment:
      name: production
      url: https://knbiosciences.in

    steps:
      - name: Wait for approval
        run: echo "Waiting for manual approval..."

      - name: Check staging health
        run: |
          curl -f https://staging-api.knbiosciences.in/health || exit 1

      - name: Verify test coverage
        run: |
          echo "Test coverage verified for production deployment"

  # ===========================================
  # Deploy to Production
  # ===========================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deployment-gate]
    if: github.ref == 'refs/heads/main'

    environment:
      name: production
      url: https://knbiosciences.in

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download API artifacts
        uses: actions/download-artifact@v3
        with:
          name: api-dist
          path: apps/api/dist

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_PRODUCTION_SERVICE_ACCOUNT_KEY }}
          project_id: ${{ secrets.GCP_PRODUCTION_PROJECT_ID }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            gcr.io/${{ secrets.GCP_PRODUCTION_PROJECT_ID }}/kn-api:latest
            gcr.io/${{ secrets.GCP_PRODUCTION_PROJECT_ID }}/kn-api:${{ github.sha }}

      - name: Deploy API to Production
        run: |
          gcloud run deploy kn-api \
            --image gcr.io/${{ secrets.GCP_PRODUCTION_PROJECT_ID }}/kn-api:latest \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --allow-unauthenticated \
            --set-env-vars NODE_ENV=production \
            --set-secrets SUPABASE_URL=supabase-url:latest,SUPABASE_SERVICE_ROLE_KEY=supabase-key:latest,JWT_SECRET=jwt-secret:latest

      - name: Deploy Landing Page
        run: |
          gcloud run deploy kn-landing \
            --image gcr.io/${{ secrets.GCP_PRODUCTION_PROJECT_ID }}/kn-landing:latest \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --allow-unauthenticated

      - name: Deploy B2B Portal
        run: |
          gcloud run deploy kn-b2b \
            --image gcr.io/${{ secrets.GCP_PRODUCTION_PROJECT_ID }}/kn-b2b:latest \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --allow-unauthenticated

      - name: Deploy B2C Portal
        run: |
          gcloud run deploy kn-b2c \
            --image gcr.io/${{ secrets.GCP_PRODUCTION_PROJECT_ID }}/kn-b2c:latest \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --allow-unauthenticated

      - name: Verify production deployment
        run: |
          gcloud run services describe kn-api \
            --platform managed \
            --region ${{ env.GCP_REGION }}

      - name: Run smoke tests
        run: |
          curl -f https://api.knbiosciences.in/health || exit 1
          curl -f https://knbiosciences.in || exit 1
          curl -f https://www.knbiosciences.in || exit 1
          curl -f https://agriculture.knbiosciences.in || exit 1

  # ===========================================
  # Post-Deployment Verification
  # ===========================================
  post-deployment:
    name: Post-Deployment Verification
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()

    steps:
      - name: Check API health
        run: |
          curl -f https://api.knbiosciences.in/health || echo "API health check failed"

      - name: Check landing page
        run: |
          curl -f https://knbiosciences.in || echo "Landing page check failed"

      - name: Check B2B portal
        run: |
          curl -f https://www.knbiosciences.in || echo "B2B portal check failed"

      - name: Check B2C portal
        run: |
          curl -f https://agriculture.knbiosciences.in || echo "B2C portal check failed"

  # ===========================================
  # Notify
  # ===========================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-production, post-deployment]
    if: always()

    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "KN Biosciences Deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*KN Biosciences Deployment*\nStatus: ${{ job.status }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nEnvironment: ${{ github.ref == 'refs/heads/main' && 'Production' || 'Staging' }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        if: failure()
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Deployment ${{ job.status }} - KN Biosciences"
          to: devops@knbiosciences.in
          from: GitHub Actions
          body: |
            Deployment Status: ${{ job.status }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Environment: ${{ github.ref == 'refs/heads/main' && 'Production' || 'Staging' }}
            Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
